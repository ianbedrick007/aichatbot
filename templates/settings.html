{% extends "base.html" %}

{% block content %}
<div class="page-header mb-8">
    <h1 class="text-xl font-bold mb-1">Settings</h1>
    <p class="text-secondary">Configure your business profile and AI preferences.</p>
</div>

<div class="max-w-2xl">
    {% if messages %}
    <div class="mb-6 p-4 border rounded badge-success">
        {% for message in messages %}
        <div>{{ message }}</div>
        {% endfor %}
    </div>
    {% endif %}

    <div class="card">
        <form action="/settings" method="post">
            <div class="grid grid-cols-2 gap-6 mb-8">
                <div class="form-group col-span-2">
                    <label class="block mb-2 font-medium">WhatsApp Phone Number
                        ID</label>
                    <input type="text" name="phone_number_id" class="form-control"
                        value="{{ business.phone_number_id or '' }}" placeholder="Enter your WhatsApp Phone ID">
                </div>

                <div class="form-group col-span-2">
                    <label class="block mb-2 font-medium">AI Persona</label>
                    <textarea name="persona" class="form-control" rows="12"
                        placeholder="Describe how your AI should behave...">{{ business.persona or '' }}</textarea>
                </div>
            </div>

            <div class="d-flex justify-end gap-4 p-6 border-top">
                <button type="button" class="btn btn-outline">Discard Changes</button>
                <button type="submit" class="btn btn-primary">Save Settings</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
