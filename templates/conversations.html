<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Live Feed | OmniLabs</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/whatsapp.css') }}">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Specific sidebar link for return to dashboard */
        .wa-return-btn {
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--wa-green);
            font-weight: 600;
            font-size: 13px;
            border-bottom: 1px solid var(--wa-border);
            background: #f8f9fa;
        }

        .wa-return-btn:hover {
            background: #eee;
        }

        .wa-header-logo {
            background: #fff;
            padding: 5px;
        }

        .wa-profile-placeholder {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #dfe5e7;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #adb5bd;
        }

        .wa-header-placeholder {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #dfe5e7;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #adb5bd;
        }

        .icon-return {
            width: 18px;
            height: 18px;
        }

        .icon-search-wa {
            width: 16px;
            height: 16px;
            color: #54656f;
        }

        .icon-lock-wa {
            width: 12px;
            height: 12px;
        }

        .icon-user-wa {
            width: 24px;
            height: 24px;
        }

        .icon-user-wa-sm {
            width: 20px;
            height: 20px;
        }

        .icon-mic-wa {
            width: 24px;
            height: 24px;
            cursor: pointer;
        }

        .wa-ai-active-label {
            color: #00a884;
        }

        .wa-chat-header-name {
            font-weight: 500;
            color: #111b21;
        }
    </style>
</head>

<body class="whatsapp-mode">
    <div class="wa-app-container">
        <!-- Sidebar -->
        <aside class="wa-sidebar">
            <a href="/" class="wa-return-btn">
                <i data-lucide="arrow-left" class="icon-return"></i> BACK TO DASHBOARD
            </a>

            <header class="wa-sidebar-header">
                <img src="{{ url_for('static', path='assets/transp background 1, omni.png') }}"
                    class="wa-profile-img wa-header-logo" alt="Omni">
                <div class="wa-main-header-icons">
                    <i data-lucide="users-2"></i>
                    <i data-lucide="circle-dashed"></i>
                    <i data-lucide="message-square-plus"></i>
                    <i data-lucide="more-vertical"></i>
                </div>
            </header>

            <div class="wa-search-container">
                <div class="wa-search-box">
                    <i data-lucide="search" class="icon-search-wa"></i>
                    <input type="text" class="wa-search-input" placeholder="Search or start new chat">
                </div>
            </div>

            <div class="wa-chat-list" id="customer-list">
                <div class="text-center p-8 mt-12 opacity-50">
                    Loading chats...
                </div>
            </div>
        </aside>

        <!-- Main Chat Pane -->
        <main class="wa-main" id="chat-pane">
            <div class="wa-empty-state">
                <img src="{{ url_for('static', path='assets/transp background 1, omni.png') }}" alt="Omni"
                    class="wa-empty-icon">
                <h1 class="wa-empty-title">WhatsApp for Business</h1>
                <p class="wa-empty-text">
                    Send and receive messages without keeping your phone online. Use OmniLabs AI to automate your
                    customer engagement on WhatsApp.
                </p>
                <div class="wa-encryption-note">
                    <i data-lucide="lock" class="icon-lock-wa"></i> End-to-end encrypted
                </div>
            </div>
        </main>
    </div>

    <script>
        let currentCustomerId = null;
        let refreshInterval = null;

        async function loadCustomers() {
            try {
                const resp = await fetch('/api/customers');
                const data = await resp.json();
                renderCustomerList(data.customers);
            } catch (err) {
                console.error('Failed to load customers:', err);
            }
        }

        function renderCustomerList(customers) {
            const list = document.getElementById('customer-list');
            if (!customers || customers.length === 0) {
                list.innerHTML = `<div class="text-center p-8 mt-12 opacity-50">No active conversations</div>`;
                return;
            }

            list.innerHTML = customers.map(c => `
                <div class="wa-chat-item ${c.id === currentCustomerId ? 'active' : ''}" onclick="selectCustomer('${c.id}', '${c.name.replace(/'/g, "\\'")}')">
                    <div class="wa-profile-placeholder">
                        <i data-lucide="user" class="icon-user-wa"></i>
                    </div>
                    <div class="wa-chat-item-info">
                        <div class="wa-chat-item-header">
                            <span class="wa-chat-item-name">${c.name}</span>
                            <span class="wa-chat-item-time">${c.last_timestamp ? c.last_timestamp.split(' ')[1].substring(0, 5) : ''}</span>
                        </div>
                        <div class="wa-chat-item-msg">
                            ${c.ai_enabled ? '<span class="wa-ai-active-label">[AI Active]</span> ' : ''}
                            ${c.last_message || 'Start a conversation'}
                        </div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        async function selectCustomer(id, name) {
            currentCustomerId = id;
            document.querySelectorAll('.wa-chat-item').forEach(el => el.classList.remove('active'));
            loadMessages(id);
            renderChatWindow(name);

            if (refreshInterval) clearInterval(refreshInterval);
            refreshInterval = setInterval(() => loadMessages(id), 5000);
            loadCustomers();
        }

        async function loadMessages(id) {
            if (!id || id !== currentCustomerId) return;
            try {
                const resp = await fetch(`/api/customer-messages/${id}`);
                const data = await resp.json();
                const msgList = document.getElementById('message-list');
                if (!msgList) return;

                const html = data.messages.map(m => `
                    <div class="wa-msg-bubble ${m.is_bot ? 'sent' : 'received'}">
                        ${m.text}
                        <span class="wa-msg-time">${m.timestamp.split(' ')[1].substring(0, 5)}</span>
                    </div>
                `).join('');

                if (msgList.innerHTML !== html) {
                    msgList.innerHTML = html;
                    msgList.scrollTop = msgList.scrollHeight;
                }
            } catch (err) {
                console.error('Failed to load messages:', err);
            }
        }

        function renderChatWindow(name) {
            const pane = document.getElementById('chat-pane');
            pane.innerHTML = `
                <div class="wa-main-header">
                    <div class="wa-main-header-info">
                        <div class="wa-header-placeholder">
                            <i data-lucide="user" class="icon-user-wa-sm"></i>
                        </div>
                        <div>
                            <div class="wa-chat-header-name">${name}</div>
                            <div class="wa-online-status" id="online-status">Online</div>
                        </div>
                    </div>
                    <div class="wa-main-header-icons">
                        <i data-lucide="search"></i>
                        <i data-lucide="more-vertical"></i>
                    </div>
                </div>

                <div class="wa-chat-messages" id="message-list">
                    <div style="height: 100%; display: flex; align-items: center; justify-content: center; color: #667781;">Syncing...</div>
                </div>

                <footer class="wa-footer">
                    <div class="wa-footer-icons">
                        <i data-lucide="smile"></i>
                        <i data-lucide="paperclip"></i>
                    </div>
                    <div class="wa-input-container">
                        <input type="text" id="manual-msg" class="wa-input" placeholder="Type a message" onkeypress="handleKeyPress(event)">
                    </div>
                    <div id="action-btn" style="color: #54656f;">
                        <i data-lucide="mic" class="icon-mic-wa"></i>
                    </div>
                    <button id="ai-toggle-btn" class="btn-ai-toggle" onclick="toggleAI()">AI OFF</button>
                </footer>
            `;
            lucide.createIcons();
            checkAIStatus();
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') sendMessage();
        }

        async function checkAIStatus() {
            if (!currentCustomerId) return;
            const resp = await fetch('/api/customers');
            const data = await resp.json();
            const c = data.customers.find(cust => cust.id === currentCustomerId);
            if (c) updateToggleButton(c.ai_enabled);
        }

        function updateToggleButton(enabled) {
            const btn = document.getElementById('ai-toggle-btn');
            if (!btn) return;
            btn.innerText = enabled ? 'AI ACTIVE' : 'AI DISABLED';
            btn.style.background = enabled ? '#00a884' : '#667781';
            btn.style.color = '#fff';
            btn.style.border = 'none';
        }

        async function toggleAI() {
            const btn = document.getElementById('ai-toggle-btn');
            const newState = !btn.innerText.includes('ACTIVE');
            try {
                await fetch('/api/toggle-ai', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ customer_id: currentCustomerId, enable_ai: newState })
                });
                checkAIStatus();
                loadCustomers();
            } catch (err) { console.error(err); }
        }

        async function sendMessage() {
            const input = document.getElementById('manual-msg');
            const msg = input.value.trim();
            if (!msg || !currentCustomerId) return;

            try {
                await fetch('/api/toggle-ai', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        customer_id: currentCustomerId,
                        enable_ai: false,
                        message: msg
                    })
                });
                input.value = '';
                loadMessages(currentCustomerId);
                checkAIStatus();
            } catch (err) { console.error(err); }
        }

        loadCustomers();
        setInterval(loadCustomers, 30000);
        lucide.createIcons();
    </script>
</body>

</html>
