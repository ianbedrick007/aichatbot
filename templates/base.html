<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}OmniLabs{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', path='css/variables.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/layout.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/components.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/utilities.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/responsive.css') }}">
    <!-- Production Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    {% block extra_css %}{% endblock %}
</head>

<body class="dashboard-body">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <a href="/" class="sidebar-logo">
                <img src="{{ url_for('static', path='assets/transp background 1, omni.png') }}" alt="OmniLabs Logo"
                    class="sidebar-logo-img">
                <span class="logo-text">OmniLabs</span>
            </a>
        </div>

        <nav class="sidebar-nav">
            <div class="nav-section">
                <p class="nav-section-title">Main</p>
                <a href="/" class="nav-link {% if request.url.path == '/' %}active{% endif %}">
                    <i data-lucide="layout-dashboard" class="nav-icon"></i> Dashboard
                </a>
                <a href="/products" class="nav-link {% if request.url.path == '/products' %}active{% endif %}">
                    <i data-lucide="package" class="nav-icon"></i> Products
                </a>
                <a href="/conversations"
                    class="nav-link {% if request.url.path == '/conversations' %}active{% endif %}">
                    <i data-lucide="message-square" class="nav-icon"></i> Conversations
                </a>
                <a href="/chat" class="nav-link {% if request.url.path == '/chat' %}active{% endif %}">
                    <i data-lucide="bot" class="nav-icon"></i> AI Chat
                </a>
            </div>

            <div class="nav-section">
                <p class="nav-section-title">System</p>
                <a href="/settings" class="nav-link {% if request.url.path == '/settings' %}active{% endif %}">
                    <i data-lucide="settings" class="nav-icon"></i> Settings
                </a>
            </div>
        </nav>

        <div class="sidebar-footer">
            <div class="user-profile">
                <div class="user-avatar">{{ business.name[0] if business else 'U' }}</div>
                <div class="user-info">
                    <p class="user-name">{{ business.name if business else 'User' }}</p>
                    <p class="user-plan">Pro Plan</p>
                </div>
            </div>
            <a href="/logout" class="logout-btn">
                <i data-lucide="log-out" class="icon-sm"></i> Logout
            </a>
        </div>
    </aside>

    <!-- Main Content Area -->
    <div class="app-shell">
        <!-- Top Bar -->
        <header class="topbar">
            <div class="topbar-left">
                <button class="icon-btn mobile-only" title="Toggle Sidebar" id="menu-btn" aria-label="Open Menu">
                    <i data-lucide="menu" class="icon-md"></i>
                </button>
                <div class="topbar-search">
                    <i data-lucide="search" class="search-icon"></i>
                    <input type="text" placeholder="Search anything..." aria-label="Search">
                </div>
            </div>
            <div class="topbar-actions">
                <a href="/settings" class="btn btn-sm btn-primary">Upgrade</a>
            </div>
        </header>

        <!-- Page Content -->
        <main class="page-content">
            <div class="content-container">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        // Mobile Sidebar Toggle
        const sidebar = document.getElementById('sidebar');
        const menuBtn = document.getElementById('menu-btn');

        menuBtn.addEventListener('click', () => {
            sidebar.classList.toggle('sidebar-visible');
        });

        // Close sidebar when clicking outside of it on mobile
        document.addEventListener('click', (event) => {
            if (window.innerWidth < 1024) {
                const isClickInsideSidebar = sidebar.contains(event.target);
                const isClickOnMenuBtn = menuBtn.contains(event.target);

                if (!isClickInsideSidebar && !isClickOnMenuBtn && sidebar.classList.contains('sidebar-visible')) {
                    sidebar.classList.remove('sidebar-visible');
                }
            }
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>

</html>
