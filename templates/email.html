<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #111b21;
            margin: 0;
            padding: 0;
            background-color: #f4f7f9;
        }
        .wrapper {
            width: 100%;
            padding: 20px 0;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #ffffff;
            border: 1px solid #e1e8ed;
            border-radius: 8px;
            overflow: hidden;
        }
        .header {
            background-color: #111b21;
            padding: 30px;
            text-align: center;
        }
        .logo {
            color: #00f2ff;
            font-size: 24px;
            font-weight: bold;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .content {
            padding: 40px 30px;
        }
        .footer {
            background-color: #f8f9fa;
            padding: 20px;
            text-align: center;
            font-size: 12px;
            color: #667781;
            border-top: 1px solid #e1e8ed;
        }
        .button {
            display: inline-block;
            padding: 12px 24px;
            background-color: #111b21;
            color: #ffffff;
            text-decoration: none;
            border-radius: 4px;
            font-weight: 600;
            margin-top: 20px;
        }
        h1 {
            margin-top: 0;
            font-size: 20px;
            color: #111b21;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="container">
            <div class="header">
                <div class="logo">OmniLabs</div>
            </div>
            <div class="content">
                <h1>{{ subject }}</h1>
                <p>{{ content }}</p>
                {% if action_url %}
                <a href="{{ action_url }}" class="button">View Dashboard</a>
                {% endif %}
            </div>
            <div class="footer">
                &copy; {{ year }} OmniLabs. All rights reserved.<br>
                This is an automated notification from your Business Command Center.
            </div>
        </div>
    </div>
</body>
</html>
