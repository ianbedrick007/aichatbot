<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REGISTER | OMNILABS</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/main.css') }}">
    <style>
        .auth-card {
            background: var(--base-white);
            border: 2px solid var(--base-black);
            box-shadow: 12px 12px 0px var(--base-black);
        }
    </style>
</head>

<body class="dashboard-body d-flex align-center justify-center min-vh-100 p-4">
    <div class="auth-card max-w-md w-full p-12">
        <div class="text-center mb-10">
            <img src="{{ url_for('static', path='assets/transp background 1, omni.png') }}" alt="OmniLabs Logo"
                class="auth-logo">
            <h2 class="text-xl font-bold uppercase mb-2">OPERATOR REGISTRATION</h2>
            <p class="text-xs font-bold opacity-70 uppercase">INITIALIZE NEW BUSINESS PROTOCOL</p>
        </div>

        {% if error %}
        <div class="mb-8 p-3 border-2 border-black bg-black text-white text-center text-xs font-bold uppercase">
            {{ error }}
        </div>
        {% endif %}

        <form action="/signup" method="post" class="d-flex flex-column gap-6">
            <div class="form-group mb-0">
                <label class="form-label" for="business_name">BUSINESS DESIGNATION</label>
                <input type="text" id="business_name" name="business_name" class="form-control"
                    placeholder="ENTER BUSINESS NAME..." required autocomplete="organization">
            </div>

            <div class="form-group mb-0">
                <label class="form-label" for="username">OPERATOR ID</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="CHOOSE USERNAME..."
                    required autocomplete="username">
            </div>

            <div class="form-group mb-0">
                <label class="form-label" for="email">COMMUNICATION CHANNEL (EMAIL)</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="NAME@COMPANY.COM" required
                    autocomplete="email">
            </div>

            <div class="form-group mb-4">
                <label class="form-label" for="password">ACCESS KEY (PASSWORD)</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="••••••••"
                    required autocomplete="new-password">
            </div>

            <button type="submit" class="btn btn-primary w-full">REGISTER SYSTEM</button>
        </form>

        <div class="mt-8 text-center text-xs font-bold">
            <span class="opacity-70 uppercase">ALREADY REGISTERED?</span>
            <a href="/login" class="text-brand underline uppercase ml-1">LOGIN HERE</a>
        </div>
    </div>
</body>

</html>
