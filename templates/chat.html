{% extends "base.html" %}

{% block title %}AI Testing Console | OmniLabs{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', path='css/chat_v2.css') }}">
{% endblock %}

{% block content %}
<div class="chat-container-v2">
    <header class="chat-v2-header">
        <h2>
            <i data-lucide="bot" class="icon-sm text-brand"></i> OMNILABS AI CONSOLE
        </h2>
        <div class="d-flex align-center gap-4">
            <button class="btn btn-sm btn-outline text-error" onclick="clearSession()">
                <i data-lucide="trash-2" class="icon-sm"></i> CLEAR CONSOLE
            </button>
        </div>
    </header>

    <main class="chat-v2-messages" id="chat-messages">
        <div class="text-center p-12 opacity-30 mt-12" id="chat-empty-state">
            <i data-lucide="bot" class="icon-lg mb-4 d-inline-block"></i>
            <p class="font-bold uppercase tracking-widest text-xs">OMNI SYSTEM INITIALIZED</p>
            <p class="text-xs mt-2 uppercase">Awaiting operator input...</p>
        </div>
    </main>

    <footer class="chat-v2-input-area">
        <form class="chat-v2-form" id="chat-form">
            <input type="text" id="user-input" class="chat-v2-input" placeholder="Enter command or message..." required
                autocomplete="off">
            <button type="submit" class="chat-v2-send" id="send-btn" title="SEND MESSAGE" aria-label="SEND MESSAGE">
                <i data-lucide="send" class="icon-sm"></i>
            </button>
        </form>
    </footer>
</div>
{% endblock %}

{% block extra_js %}
<script>
    const chatForm = document.getElementById('chat-form');
    const userInput = document.getElementById('user-input');
    const chatMessages = document.getElementById('chat-messages');
    const sendBtn = document.getElementById('send-btn');
    const emptyState = document.getElementById('chat-empty-state');

    function appendMessage(text, sender) {
        if (emptyState) {
            emptyState.style.display = 'none';
        }

        const msgDiv = document.createElement('div');
        msgDiv.className = `chat-v2-msg ${sender}`;

        const timestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

        msgDiv.innerHTML = `
            <div class="chat-v2-bubble">
                ${text.replace(/\n/g, '<br>')}
            </div>
            <div class="chat-v2-meta">
                ${sender.toUpperCase()} | ${timestamp}
            </div>
        `;

        chatMessages.appendChild(msgDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    chatForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const text = userInput.value.trim();
        if (!text) return;

        appendMessage(text, 'user');
        userInput.value = '';

        // Loading state
        sendBtn.disabled = true;
        const loadingDiv = document.createElement('div');
        loadingDiv.className = 'chat-v2-msg bot';
        loadingDiv.id = 'loading-indicator';
        loadingDiv.innerHTML = '<div class="chat-v2-bubble opacity-50">Sychronizing neural networks...</div>';
        chatMessages.appendChild(loadingDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;

        try {
            const resp = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text })
            });

            const indicator = document.getElementById('loading-indicator');
            if (indicator) indicator.remove();

            if (resp.ok) {
                const data = await resp.json();
                appendMessage(data.response, 'bot');
            } else {
                appendMessage("CRITICAL ERROR: FAILED TO COMMUNICATE WITH AI CORE.", 'bot');
            }
        } catch (err) {
            const indicator = document.getElementById('loading-indicator');
            if (indicator) indicator.remove();
            appendMessage("CONNECTION INTERRUPTED: CHECK NETWORK PROTOCOLS.", 'bot');
            console.error(err);
        } finally {
            sendBtn.disabled = false;
        }
    });

    async function clearSession() {
        if (!confirm('CONFIRM SESSION CLEARANCE? ALL CONSOLE HISTORY WILL BE PURGED.')) return;

        try {
            await fetch('/clear-session', { method: 'POST' });
            location.reload();
        } catch (err) {
            console.error('Purge failed:', err);
        }
    }
</script>
{% endblock %}
