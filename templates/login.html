<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN | OMNILABS</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/main.css') }}">
    <style>
        body.auth-page {
            background-color: #f8f9fa;
            /* Subtle contrast background */
        }

        .auth-card {
            background: var(--base-white);
            border: 2px solid var(--base-black);
            box-shadow: 16px 16px 0px var(--base-black);
            margin: auto;
            /* Ensure centering in flex */
        }
    </style>
</head>

<body class="auth-page d-flex align-center justify-center min-vh-100 p-4">
    <div class="auth-card max-w-md w-full p-12">
        <div class="text-center mb-10">
            <img src="{{ url_for('static', path='assets/transp background 1, omni.png') }}" alt="OmniLabs Logo"
                class="auth-logo">
            <h2 class="text-xl font-bold uppercase mb-2">SYSTEM ACCESS</h2>
            <p class="text-xs font-bold opacity-70 uppercase">PROCEED WITH CREDENTIALS</p>
        </div>

        {% if error %}
        <div class="mb-8 p-3 border-2 border-black bg-black text-white text-center text-xs font-bold uppercase">
            {{ error }}
        </div>
        {% endif %}

        <form action="/login" method="post" class="d-flex flex-column gap-6">
            <div class="form-group mb-0">
                <label class="form-label" for="username">OPERATOR ID</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="ENTER USERNAME..."
                    required autocomplete="username">
            </div>

            <div class="form-group mb-4">
                <label class="form-label" for="password">ACCESS KEY</label>
                <input type="password" id="password" name="password" class="form-control"
                    placeholder="ENTER PASSWORD..." required autocomplete="current-password">
            </div>

            <button type="submit" class="btn btn-primary w-full">INITIALIZE SESSION</button>
        </form>

        <div class="mt-8 text-center text-xs font-bold">
            <span class="opacity-70 uppercase">UNREGISTERED OPERATOR?</span>
            <a href="/signup" class="text-brand underline uppercase ml-1">REGISTER HERE</a>
        </div>
    </div>
</body>

</html>
